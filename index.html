<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pig Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a6fc4 20%, #a8d4f5 60%, #1a6fc4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game {
            width: min(900px, 95%);
            background: transparent;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 100vh;
        }

        .players {
            display: flex;
            justify-content: space-between;
            border: 2px solid #b5d4f4;
            border-radius: 15px;
            align-items: stretch;
            gap: 20px;
            width: 100%;
            position: relative;
            overflow: visible;
            padding: 12px;
            background: rgba(255,255,255,0.02);
        }

        .player {
            flex: 1 1 0;
            background: rgba(30, 100, 180, 0.12);
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background 0.4s;
            opacity: 0.8;
            min-width: 0;
        }

        .player h2 { margin-bottom: 10px; font-size: 1.1rem; }

        .score-main { display:flex; flex-direction:column; justify-content:center; align-items:center; }

        .score { font-size: clamp(1.5rem, 4vw, 3rem); font-weight: bold; color: #185fa5; }

        .current-score-main {
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            background: #185fa5; color: white; border-radius: 10px; padding: 8px; margin-top: 12px;
        }

        .current-score { font-size: clamp(1rem, 2.5vw, 1.5rem); font-weight: bold; }

        .dice {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            height: 110px; width: 110px; border: 2px solid #b5d4f4; border-radius: 10px;
            background: rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center;
            padding: 10px; z-index: 5;
        }

        .dice img { width: 100%; height: auto; object-fit: contain; }

        .controls { display:flex; justify-content:center; gap:12px; align-items:center; padding-top:6px; }

        button {
            border: none; padding: 10px 18px; font-size: 1rem; border-radius: 10px; cursor: pointer;
            background: #185fa5; color: white; transition: transform 0.2s, background 0.2s; font-weight:700;
        }

        button:hover { transform: translateY(-2px); background: #0c447c; }

        #reset { background: #6c757d; }
        #reset:hover { background: #5a6268; }

        .active { background: rgba(100, 180, 255, 0.32); opacity: 1; }
        .active .current-score-main { background: #378add; }
        .active .current-score { font-size: clamp(1.25rem, 3.25vw, 2.75rem); }

        @media (max-width: 900px) {
            .dice { height: 90px; width: 90px; }
            .players { padding: 10px; }
        }

        @media (max-width: 700px) {
            .players { flex-direction: column; gap: 14px; }
            .dice { position: static; transform: none; margin: 0 auto; width: 80px; height: 80px; }
            .controls { flex-direction: column; width: 100%; }
            button { width: 100%; padding: 12px; }
            .game { padding: 12px; }
            .player { padding: 12px; }
        }
    </style>
</head>

<body>

    <div class="game">
        <div class="players">
            <div class="player active" id="player1">
                <div class="score-main">
                    <h2>Player 1</h2>
                    <div class="score">0</div>
                </div>
                <div class="current-score-main">
                    <p>CURRENT SCORE</p>
                    <div class="current-score">0</div>
                </div>
            </div>

            <div class="dice">
                <img id="diceImg" src="assets/dice_1.png" alt="Dice">
            </div>

            <div class="player" id="player2">
                <div class="score-main">
                    <h2>Player 2</h2>
                    <div class="score">0</div>
                </div>
                <div class="current-score-main">
                    <p>CURRENT SCORE</p>
                    <div class="current-score">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="diceBtn">🎲 Roll Dice</button>
            <button id="holdBtn">✋ Hold</button>
            <button id="reset">🔄 Reset</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
